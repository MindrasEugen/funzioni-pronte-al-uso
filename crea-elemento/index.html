<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Elemento - Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <h1>Crea Elemento</h1>

    <div class="container">
        <p>Questa pagina dimostra la funzione <code>crea(tag, classe, testo)</code>.</p>
        <p>Ogni 2 secondi viene creato un nuovo elemento <code>div</code> con classe <code>.box</code>
            e aggiunto alla pagina.</p>
        <p>Gli elementi appaiono con un effetto di animazione.</p>
    </div>

    <div class="elements-container" id="elements"></div>

    <script src="js/createElement.js"></script>
</body>

</html>
