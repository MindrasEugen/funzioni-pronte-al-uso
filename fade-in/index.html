<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In - Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Fade In</h1>
    
    <div class="container">
        <p>Questa pagina dimostra la funzione <code>fadeIn(elemento, durata)</code>.</p>
        <p>Gli elementi sottostanti appariranno con effetto fade-in al caricamento della pagina.</p>
        
        <button id="resetBtn">Resetta e ripeti animazione</button>
        
        <p class="hint">Clicca il bottone per vedere l'animazione da capo.</p>
    </div>
    
    <div id="elements">
        <div class="box">Elemento 1</div>
        <div class="box">Elemento 2</div>
        <div class="box">Elemento 3</div>
        <div class="box">Elemento 4</div>
        <div class="box">Elemento 5</div>
    </div>

    <script src="js/animations.js"></script>
</body>
</html>
